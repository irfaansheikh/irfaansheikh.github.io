        tips:["Use branch protection rules on `main` to enforce PR reviews before merging.","Add a .gitignore file to exclude node_modules, .env, and build artifacts."]},

        code:[{filename:"app.js",content:`const express = require('express');

        code:[{filename:"Dockerfile",content:`# ---- Stage 1: Build ----
FROM node:18-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production

# ---- Stage 2: Production ----
FROM node:18-alpine AS production
WORKDIR /app

# Create non-root user for security
RUN addgroup -S appgroup && adduser -S appuser -G appgroup

COPY --from=builder /app/node_modules ./node_modules
COPY . .

RUN chown -R appuser:appgroup /app
USER appuser

ENV NODE_ENV=production
ENV PORT=3000
EXPOSE 3000

HEALTHCHECK --interval=30s --timeout=5s --start-period=10s \\

CMD ["node", "app.js"]`},{filename:".dockerignore",content:`node_modules

      {id:8,title:"Write GitHub Actions CI/CD Workflow",description:"The heart of the project. This YAML file defines the full pipeline: build → test → dockerize → deploy on every push to main.",
        code:[{filename:".github/workflows/cicd.yml",content:`name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: \${{ secrets.DOCKERHUB_USERNAME }}/my-devops-app

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  dockerize:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: \${{ secrets.DOCKERHUB_USERNAME }}
          password: \${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            \${{ env.IMAGE_NAME }}:latest
            \${{ env.IMAGE_NAME }}:\${{ github.sha }}

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: dockerize
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: \${{ secrets.EC2_HOST }}
          username: \${{ secrets.EC2_USER }}
          key: \${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull \${{ env.IMAGE_NAME }}:latest
            docker stop myapp || true
            docker rm myapp || true
            docker run -d \\
              --name myapp \\
              --restart unless-stopped \\
              -p 3000:3000 \\
              -e NODE_ENV=production \\
              \${{ env.IMAGE_NAME }}:latest
            sleep 5
            curl -f http://localhost:3000/health || exit 1
            docker image prune -f
            echo "Deployment successful!"`}],
        tips:["The pipeline has 3 jobs: build-and-test → dockerize → deploy. Each depends on the previous.","The `needs:` keyword creates job dependencies — deploy only runs if dockerize succeeds.","GitHub Secrets needed: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, EC2_HOST, EC2_USER, EC2_SSH_KEY."],

let currentView = 'run';
let completedSteps = new Set();
const totalSteps = PROJECTS.reduce((a, p) => a + p.steps.length, 0);

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!';
    btn.classList.add('text-green-400');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-green-400'); }, 2000);
  });
}

function codeBlock(content, filename, lang='bash') {
  const isTerminal = lang === 'bash';
  const icon = isTerminal ? '⬛' : '📄';
  const id = 'code-' + Math.random().toString(36).substr(2,9);
  const escapedContent = escapeHtml(content);
  const rawContent = content;
  return `<div class="rounded-xl overflow-hidden border border-slate-700/60 bg-slate-900/80 mt-3">
    <div class="flex items-center justify-between px-4 py-2 bg-slate-800/80 border-b border-slate-700/60">
      <div class="flex items-center gap-2">
        <span class="${isTerminal ? 'text-green-400' : 'text-blue-400'} text-sm">${icon}</span>
        <span class="text-xs font-mono text-slate-400">${escapeHtml(filename || lang)}</span>
      </div>
      <button onclick="copyToClipboard(document.getElementById('${id}').textContent, this)" class="copy-btn flex items-center gap-1.5 text-xs text-slate-400 hover:text-white transition-colors bg-slate-700/50 hover:bg-slate-700 px-2 py-1 rounded-md">
        📋 Copy
      </button>
    </div>
    <pre class="overflow-x-auto p-4 text-sm font-mono text-slate-200 leading-relaxed"><code id="${id}">${escapedContent}</code></pre>
  </div>`;
}

function tipsBlock(tips, type='tip') {
  if (!tips || !tips.length) return '';
  const cfg = {
    tip: {bg:'bg-blue-500/5',border:'border-blue-500/20',tc:'text-blue-400',label:'💡 Tips & Best Practices',arrow:'text-blue-400'},
    warn: {bg:'bg-amber-500/5',border:'border-amber-500/20',tc:'text-amber-400',label:'⚠️ Important Warnings',arrow:'text-amber-400'},
    danger: {bg:'bg-red-500/5',border:'border-red-500/20',tc:'text-red-400',label:'🚨 Danger',arrow:'text-red-400'},
    check: {bg:'bg-green-500/5',border:'border-green-500/20',tc:'text-green-400',label:'✅ Verification Checks',arrow:'text-green-400'},
  };
  const c = cfg[type];
  return `<div class="rounded-xl ${c.bg} border ${c.border} p-4">
    <div class="text-xs font-semibold ${c.tc} uppercase tracking-wider mb-2">${c.label}</div>
    <ul class="space-y-1.5">
      ${tips.map(t => `<li class="flex gap-2 text-sm text-slate-300"><span class="${c.arrow} mt-0.5 flex-shrink-0">→</span><span>${escapeHtml(t)}</span></li>`).join('')}
    </ul>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════
function updateProgress() {
  const pct = totalSteps > 0 ? Math.round((completedSteps.size / totalSteps) * 100) : 0;
  document.getElementById('hdr-progress-text').textContent = `${completedSteps.size}/${totalSteps} steps`;
  document.getElementById('hdr-progress-bar').style.width = pct + '%';
  document.getElementById('hdr-progress-pct').textContent = pct + '%';
  document.getElementById('sidebar-pct').textContent = pct + '%';
  document.getElementById('sidebar-progress-bar').style.width = pct + '%';
}

// SIDEBAR RENDER
// ═══════════════════════════════════════════════════════════════

  const el = document.getElementById(containerId);
  if (!el) return;

  let html = `
    <button onclick="setView('run')" class="w-full text-left rounded-xl p-3 transition-all duration-200 border mb-1.5 ${currentView==='run'?'border-cyan-500/40 bg-cyan-500/10':'border-transparent hover:border-slate-700 hover:bg-slate-800/40'}">
      <div class="flex items-center gap-3">
        <span class="text-xl">🖥️</span>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-semibold ${currentView==='run'?'text-cyan-400':'text-slate-400'}">Guide</div>
          <div class="text-sm font-medium ${currentView==='run'?'text-white':'text-slate-300'}">How to Run</div>
        </div>
        ${currentView==='run'?'<div class="w-1.5 h-1.5 rounded-full bg-cyan-400"></div>':''}
      </div>
    </button>
    <button onclick="setView('debug')" class="w-full text-left rounded-xl p-3 transition-all duration-200 border mb-1.5 ${currentView==='debug'?'border-red-500/40 bg-red-500/10':'border-transparent hover:border-slate-700 hover:bg-slate-800/40'}">
      <div class="flex items-center gap-3">
        <span class="text-xl">🛠️</span>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-semibold ${currentView==='debug'?'text-red-400':'text-slate-400'}">Survival</div>
          <div class="text-sm font-medium ${currentView==='debug'?'text-white':'text-slate-300'}">Debug Toolkit</div>
        </div>
        <span class="flex-shrink-0 text-xs font-bold bg-red-500/20 text-red-400 border border-red-500/30 px-1.5 py-0.5 rounded-full">HOT</span>
      </div>
    </button>
    <div class="pt-2 pb-1"><div class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-1">Projects</div></div>`;

  PROJECTS.forEach((p, i) => {
    const doneCount = p.steps.filter(s => completedSteps.has(`${p.id}-${s.id}`)).length;
    const pct = Math.round((doneCount / p.steps.length) * 100);
    const prevDone = i === 0 || PROJECTS[i-1].steps.every(s => completedSteps.has(`${PROJECTS[i-1].id}-${s.id}`));
    const isLocked = !prevDone;
    const isActive = currentView === `project-${p.id}`;

    html += `<button onclick="${isLocked?'':'setView(\'project-'+p.id+'\')'}" ${isLocked?'disabled':''} class="w-full text-left rounded-xl p-3 transition-all duration-200 border mb-1.5 ${isActive?p.borderColor+' '+p.bgColor+' shadow-lg':isLocked?'border-slate-800 bg-slate-900/30 opacity-50 cursor-not-allowed':'border-transparent hover:border-slate-700 hover:bg-slate-800/40'}">
      <div class="flex items-center gap-3">
        <span class="text-xl">${p.icon}</span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5">
            <span class="text-xs font-semibold ${isActive?p.color:'text-slate-400'}">Project ${p.id}</span>
            ${isLocked?'<svg class="w-3 h-3 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>':''}
          </div>
          <div class="text-sm font-medium truncate ${isActive?'text-white':'text-slate-300'}">${p.title}</div>
          ${pct>0?`<div class="mt-1.5"><div class="w-full h-1 bg-slate-700 rounded-full overflow-hidden"><div class="h-full rounded-full ${pct===100?'bg-green-500':p.barColor}" style="width:${pct}%"></div></div></div>`:''}
        </div>
        ${pct===100?'<span class="flex-shrink-0 w-5 h-5 rounded-full bg-green-500 flex items-center justify-center text-white text-xs">✓</span>':''}
      </div>
    </button>`;
  });

  el.innerHTML = html;
}

function renderAllSidebars() {
  renderSidebar('desktop-sidebar-nav');
  renderSidebar('mobile-sidebar-content');
  updateNavTabs();
}

function updateNavTabs() {
  document.getElementById('nav-run').className = `nav-tab flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${currentView==='run'?'bg-cyan-500 text-white':'text-slate-400 hover:text-white'}`;
  document.getElementById('nav-debug').className = `nav-tab flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${currentView==='debug'?'bg-red-500 text-white':'text-slate-400 hover:text-white'}`;
  document.getElementById('nav-projects').className = `nav-tab flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${currentView.startsWith('project')?'bg-violet-500 text-white':'text-slate-400 hover:text-white'}`;
}

// ═══════════════════════════════════════════════════════════════
// VIEW ROUTER
// ═══════════════════════════════════════════════════════════════
function setView(view) {
  currentView = view;
  renderAllSidebars();
  const main = document.getElementById('main-content');

  if (view === 'run') { main.innerHTML = renderRunGuide(); }
  else if (view === 'debug') { main.innerHTML = renderDebugToolkit(); initDebugToolkit(); }
  else if (view.startsWith('project-')) {
    const id = parseInt(view.split('-')[1]);
    const project = PROJECTS.find(p => p.id === id);
    if (project) main.innerHTML = renderProjectView(project);
  }
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════
// PROJECT VIEW
// ═══════════════════════════════════════════════════════════════
function renderProjectView(project) {
  const doneCount = project.steps.filter(s => completedSteps.has(`${project.id}-${s.id}`)).length;
  const progress = Math.round((doneCount / project.steps.length) * 100);

  let stepsHtml = project.steps.map((step, i) => {
    const key = `${project.id}-${step.id}`;
    const done = completedSteps.has(key);
    const isFirst = i === 0;

    let body = `<p class="text-slate-300 leading-relaxed mb-4">${escapeHtml(step.description)}</p>`;
    if (step.commands?.length) body += `<div class="mb-4"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Terminal Commands</div>${codeBlock(step.commands.join('\n'),'bash')}</div>`;
    if (step.code?.length) body += `<div class="space-y-3 mb-4"><div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Code Files</div>${step.code.map(f=>codeBlock(f.content,f.filename,'code')).join('')}</div>`;
    if (step.tips?.length) body += tipsBlock(step.tips,'tip');
    if (step.warnings?.length) body += tipsBlock(step.warnings,'warn');

    return `<div class="rounded-2xl border transition-all duration-300 ${done?'border-green-500/40 bg-green-900/10':'border-slate-700/50 bg-slate-800/40'} overflow-hidden mb-3" id="step-wrap-${key}">
      <div class="flex items-center gap-4 p-5 cursor-pointer hover:bg-white/5 transition-colors" onclick="toggleStep('${key}')">
        <div class="flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm transition-all ${done?'bg-green-500 text-white':project.bgColor+' '+project.color}">
          ${done?'✓':step.id}
        </div>
        <div class="flex-1 min-w-0">
          <span class="font-semibold text-white ${done?'line-through opacity-60':''}">${escapeHtml(step.title)}</span>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <button onclick="event.stopPropagation(); markStep('${key}', ${project.id})" class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border transition-all font-medium ${done?'border-green-500/50 text-green-400 bg-green-500/10 hover:bg-green-500/20':'border-slate-600 text-slate-400 hover:text-white hover:border-slate-400'}">
            ${done?'✓ Done':'Mark done'}
          </button>
          <span class="text-slate-500 chevron ${isFirst?'open':''}" id="chev-${key}">▼</span>
        </div>
      </div>
      <div class="step-body ${isFirst?'open':''} px-5 pb-6 border-t border-slate-700/40 pt-5" id="body-${key}">
        ${body}
      </div>
    </div>`;

function toggleStep(key) {
  const body = document.getElementById('body-' + key);
  const chev = document.getElementById('chev-' + key);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    body.classList.add('open');
    chev.classList.add('open');
  }
}

function markStep(key, projectId) {
  if (completedSteps.has(key)) completedSteps.delete(key);
  else completedSteps.add(key);
  updateProgress();
  renderAllSidebars();

  // Update step UI
  const project = PROJECTS.find(p => p.id === projectId);
  if (!project) return;
  const done = completedSteps.has(key);
  const wrap = document.getElementById('step-wrap-' + key);
  if (wrap) {
    if (done) { wrap.classList.add('border-green-500/40','bg-green-900/10'); wrap.classList.remove('border-slate-700/50','bg-slate-800/40'); }
    else { wrap.classList.remove('border-green-500/40','bg-green-900/10'); wrap.classList.add('border-slate-700/50','bg-slate-800/40'); }
  }

  // Update project progress bar
  const doneCount = project.steps.filter(s => completedSteps.has(`${project.id}-${s.id}`)).length;
  const prog = Math.round((doneCount / project.steps.length) * 100);
  const bar = document.getElementById(`proj-progress-bar-${projectId}`);
  const txt = document.getElementById(`proj-progress-text-${projectId}`);
  if (bar) bar.style.width = prog + '%';
  if (txt) txt.textContent = `${doneCount}/${project.steps.length} steps • ${prog}%`;
}

              <span class="text-xs text-slate-400">${escapeHtml(f.meaning)}</span>
            </div>`).join('')}
          </div>
        </div>`:''}
        ${cmd.tips?.length?tipsBlock(cmd.tips,'tip'):''}
        ${cmd.danger?`<div class="rounded-xl bg-red-500/5 border border-red-500/20 p-4">
          <div class="text-xs font-semibold text-red-400 uppercase tracking-wider mb-2">🚨 Danger</div>
          <p class="text-sm text-slate-300">${escapeHtml(cmd.danger)}</p>
        </div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

function renderPlatformSection(section) {
  return `<div class="space-y-4">
    <div class="rounded-xl border ${section.borderColor} ${section.bgColor} p-4">
      <div class="flex items-center gap-3">
        <span class="text-3xl">${section.icon}</span>
        <div>
          <div class="font-bold text-white">${section.title}</div>
          <div class="text-sm ${section.color}">${section.subtitle}</div>
        </div>
      </div>
    </div>
    ${section.commands.map(cmd=>`<div class="rounded-2xl border border-slate-700/50 bg-slate-800/40 overflow-hidden">
      <div class="flex items-center gap-4 p-5 cursor-pointer hover:bg-white/5 transition-colors" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.chevron').classList.toggle('open')">
        <div class="flex-shrink-0">
          <code class="text-sm font-mono font-bold ${section.color} bg-slate-900/50 px-3 py-1.5 rounded-lg">${escapeHtml(cmd.cmd)}</code>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-white text-sm font-medium">${escapeHtml(cmd.what)}</div>
        </div>
        <span class="text-slate-500 chevron">▼</span>
      </div>
      <div class="step-body px-5 pb-5 border-t border-slate-700/40 pt-4 space-y-4">
        <div class="rounded-xl bg-slate-900/50 border border-slate-700/40 p-4">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Why you'd use this</div>
          <p class="text-sm text-slate-300">${escapeHtml(cmd.why)}</p>
        </div>
        ${codeBlock(cmd.cmd, 'Command', 'bash')}
        ${cmd.flags?.length?`<div>
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Key Flags</div>
          <div class="space-y-2">
            ${cmd.flags.map(f=>`<div class="flex gap-3 items-start">
              <code class="text-xs font-mono text-cyan-400 bg-slate-900/50 px-2 py-0.5 rounded flex-shrink-0">${escapeHtml(f.flag)}</code>
              <span class="text-xs text-slate-400">${escapeHtml(f.meaning)}</span>
            </div>`).join('')}
          </div>
        </div>`:''}
        ${cmd.tips?.length?tipsBlock(cmd.tips,'tip'):''}
        ${cmd.danger?`<div class="rounded-xl bg-red-500/5 border border-red-500/20 p-4">
          <div class="text-xs font-semibold text-red-400 uppercase tracking-wider mb-2">🚨 Danger</div>
          <p class="text-sm text-slate-300">${escapeHtml(cmd.danger)}</p>
        </div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

function initDebugToolkit() {
  // No extra init needed
}

function switchDebugTab(tabId) {
  document.querySelectorAll('.debug-main-tab').forEach(btn => {
    btn.className = 'debug-main-tab flex-1 min-w-[120px] py-2 px-3 rounded-lg text-xs font-semibold transition-all text-slate-400 hover:text-white';
  });
  document.getElementById('dbgtab-' + tabId).className = 'debug-main-tab flex-1 min-w-[120px] py-2 px-3 rounded-lg text-xs font-semibold transition-all bg-red-500 text-white';
  document.querySelectorAll('.debug-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('debug-panel-' + tabId).classList.remove('hidden');
}

function switchProjDebugTab(id) {
  const section = PROJECT_DEBUG.find(p => p.id === id);
  if (!section) return;
  document.querySelectorAll('.proj-debug-tab').forEach(btn => {
    btn.className = 'proj-debug-tab text-xs px-3 py-1.5 rounded-full border font-semibold transition-all border-slate-700 text-slate-400 hover:text-white';
  });
  const btn = document.getElementById('pdtab-' + id);
  btn.className = `proj-debug-tab text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${section.badgeColor} ${section.borderColor}`;
  document.getElementById('proj-debug-content').innerHTML = renderProjDebugSection(section);
}

function switchPlatformTab(id) {
  const section = PLATFORM_DEBUG.find(p => p.id === id);
  if (!section) return;
  document.querySelectorAll('.platform-tab').forEach(btn => {
    btn.className = 'platform-tab text-xs px-3 py-1.5 rounded-full border font-semibold transition-all border-slate-700 text-slate-400 hover:text-white';
  });
  const btn = document.getElementById('pltab-' + id);
  btn.className = `platform-tab text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${section.badgeColor} ${section.borderColor}`;
  document.getElementById('platform-content').innerHTML = renderPlatformSection(section);
}

function filterCheatsheet(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.cheat-category').forEach(cat => {
    let catVisible = false;
    cat.querySelectorAll('.cheat-item').forEach(item => {
      const cmd = item.querySelector('.cheat-cmd')?.textContent?.toLowerCase() || '';
      const desc = item.querySelector('.cheat-desc')?.textContent?.toLowerCase() || '';
      const match = !q || cmd.includes(q) || desc.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) catVisible = true;
    });
    cat.style.display = catVisible ? '' : 'none';
  });
}
